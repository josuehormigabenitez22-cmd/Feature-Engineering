site_name: Feature Engineering Portfolio
site_description: Practical Feature Engineering for Machine Learning
site_author: Josue

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight

plugins:
  - search
  - mkdocs-jupyter

nav:
  - Home: index.md

  - Foundations:
      - What is Feature Engineering: foundations/what_is_feature_engineering.md
      - Feature-Target Relationship: foundations/feature_target_relationship.md
      - Baseline Model: foundations/baseline_model.md

  - Feature Engineering:
      - Feature Discovery: feature_engineering/feature_discovery.md
      - Feature Discovery Notebook: feature_engineering/feature_discovery/

  - Case Studies:
      - House Prices:
          - Overview: practical_cases/house_prices.md
          - Notebook: practical_cases/house_prices/
      - Results: practical_cases/results.md